name: Health Check

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check application health
        run: |
          curl -f --connect-timeout 10 --max-time 15 http://${{ secrets.VM_HOSTNAME }}/health || exit 1

      - name: Check Caddy health
        run: |
          curl -f --connect-timeout 10 --max-time 15 http://${{ secrets.VM_HOSTNAME }}/caddy-health || exit 1

      - name: Notify if health check fails
        if: failure()
        run: |
          echo "Health check failed for VM at ${{ secrets.VM_HOSTNAME }}"
