name: Pull Request Checks

on:
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies with dev group
        run: uv pip install --system -r pyproject.toml --extra dev 2>/dev/null || uv pip install --system -r pyproject.toml

      - name: Install mypy
        run: pip install mypy

      - name: Mypy type check
        run: mypy src/ --ignore-missing-imports
        continue-on-error: false

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -r pyproject.toml

      - name: Install pytest
        run: pip install pytest pytest-cov

      - name: Run tests
        run: |
          if [ -z "$(find tests/ -name 'test_*.py' -o -name '*_test.py' 2>/dev/null)" ]; then
            echo "⚠️  No test files found — skipping (add tests to tests/)"
            exit 0
          fi
          pytest tests/ --cov=src --cov-report=lcov --cov-report=term-missing

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.lcov
          retention-days: 30

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./app/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            OPENAI_API_KEY_BUILD=sk-proj-placeholder

  security-gate:
    name: Security Audit (pip-audit)
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install pip-audit
        run: pip install pip-audit uv

      - name: Install dependencies
        run: uv pip install --system -r pyproject.toml

      - name: Run pip-audit
        run: |
          pip-audit --format=json --output=audit-results.json || true
          python3 - <<'EOF'
          import json, sys
          try:
            with open("audit-results.json") as f:
              data = json.load(f)
          except Exception:
            print("✅ No vulnerabilities found")
            sys.exit(0)
          vulns = data.get("dependencies", [])
          high_crit = [
            v for dep in vulns for v in dep.get("vulns", [])
            if v.get("fix_versions") is not None
          ]
          if high_crit:
            print(f"❌ Found {len(high_crit)} vulnerabilities — PR blocked")
            sys.exit(1)
          print("✅ No fixable vulnerabilities found")
          EOF

  summary:
    name: PR Status Summary
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, docker-build]
    if: always()
    steps:
      - name: Check job statuses
        run: |
          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ] || \
             [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "❌ Some checks failed"
            exit 1
          fi

          echo "✅ All checks passed"
