name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          echo "${{ secrets.VM_SSH_KNOWN_HOSTS }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOSTNAME }} "echo 'SSH OK'"

      - name: Deploy to VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOSTNAME }} << 'EOFVM'
            cd ~/oute-mind

            # Discard any local modifications to tracked files
            git checkout -- .

            # Pull latest changes
            git pull origin main

            # Ensure .env points to .env.production for docker compose
            ln -sf .env.production .env

            # Rebuild and restart the app container (service name is "app")
            docker compose build app
            docker compose up -d app

            # Also ensure infra containers are running
            docker compose up -d
          EOFVM

      - name: Health check (via SSH)
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOSTNAME }} << 'EOFVM'
            for i in $(seq 1 20); do
              if docker exec oute-app curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                echo "✅ oute-mind health check PASSED"
                docker exec oute-app curl -s http://localhost:8000/health | python3 -m json.tool 2>/dev/null || true
                break
              fi
              if [ "$i" -eq 20 ]; then
                echo "❌ oute-mind health check FAILED after 20 attempts"
                exit 1
              fi
              echo "  attempt ${i}/20, retrying in 3s..."
              sleep 3
            done
          EOFVM

      - name: Deployment success
        if: success()
        run: |
          echo "✅ Deployment to VM successful!"
          echo "Services:"
          echo "  App:         http://${{ secrets.VM_HOSTNAME }} (via Caddy)"
          echo "  Healthcheck: http://${{ secrets.VM_HOSTNAME }}/caddy-health"

      - name: Capture logs on failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED — capturing container logs..."
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOSTNAME }} << 'EOFVM'
            cd ~/oute-mind
            echo "=== Container Status ==="
            docker compose ps
            echo "=== oute-app Logs ==="
            docker compose logs --tail=50 app 2>&1 || true
          EOFVM
