name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GCP_VM_SSH_PRIVATE_KEY }}" | base64 -d > ~/.ssh/github-deploy
          chmod 600 ~/.ssh/github-deploy
          echo "${{ secrets.GCP_VM_SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Create .env file
        run: |
          cat > .env.production << EOF
          GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
          SERPER_API_KEY=${{ secrets.SERPER_API_KEY }}
          COMPOSIO_API_KEY=${{ secrets.COMPOSIO_API_KEY }}
          OCR_API_KEY=${{ secrets.OCR_API_KEY }}
          QDRANT_API_KEY=${{ secrets.QDRANT_API_KEY }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB=oute_production
          REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
          MINDSDB_ADMIN_USER=mindsdb
          MINDSDB_ADMIN_PASSWORD=${{ secrets.MINDSDB_ADMIN_PASSWORD }}
          MODEL=google/gemini-2.5-flash-lite
          FASTAPI_PORT=8000
          FASTAPI_WORKERS=4
          GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}
          EOF

      - name: Deploy to VM
        run: |
          scp -i ~/.ssh/github-deploy -r . ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOSTNAME }}:~/oute-mind/

          ssh -i ~/.ssh/github-deploy ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOSTNAME }} << 'DEPLOY_SCRIPT'
          cd ~/oute-mind
          export $(cat .env.production | xargs)

          # Build e inicie os containers
          docker-compose down
          docker-compose build --no-cache
          docker-compose up -d

          # Aguarde health checks
          sleep 30

          # Validar deployment
          docker-compose ps
          curl -f http://localhost:8000/health || exit 1
          DEPLOY_SCRIPT

      - name: Get VM IP address
        id: get_ip
        run: |
          # Configurar Google Cloud SDK
          echo "${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}" | base64 -d > /tmp/gcp-key.json

          # Fazer login no GCP
          gcloud auth activate-service-account --key-file=/tmp/gcp-key.json
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

          # Obter IP
          VM_IP=$(gcloud compute addresses describe oute-mind-ip \
            --region=us-central1 --format="get(address)")
          echo "vm_ip=${VM_IP}" >> $GITHUB_OUTPUT
          echo "✅ VM IP: ${VM_IP}"

          # Limpar
          rm /tmp/gcp-key.json

      - name: Verify deployment
        run: |
          ssh -i ~/.ssh/github-deploy ${{ secrets.GCP_VM_USER }}@${{ secrets.GCP_VM_HOSTNAME }} \
            "curl -f http://localhost:8000/health || exit 1"

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment successful!"
          echo "🌐 Access your application at: http://${{ steps.get_ip.outputs.vm_ip }}"
          echo "📊 Grafana at: http://${{ steps.get_ip.outputs.vm_ip }}:3001"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment failed"
          exit 1
