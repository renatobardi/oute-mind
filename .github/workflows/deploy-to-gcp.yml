name: Deploy to GCP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_ZONE: us-central1-a
  VM_NAME: oute-mind
  DEPLOY_USER: renatobardicabral_gmail_com

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/897931738821/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@oute-mind.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Test SSH connection
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --ssh-flag="-o ConnectTimeout=30" \
            --command="echo 'SSH OK'"

      - name: Deploy to VM
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="sudo -u ${{ env.DEPLOY_USER }} bash -c '
              cd /home/${{ env.DEPLOY_USER }}/oute-mind

              git checkout -- .
              git pull origin main

              ln -sf .env.production .env

              docker compose build
              docker compose up -d
              docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || docker compose up -d --force-recreate caddy
            '"

      - name: Health check (via SSH)
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="sudo -u ${{ env.DEPLOY_USER }} bash -c '
              for i in \$(seq 1 20); do
                if docker exec oute-app curl -sf http://localhost:8000/health > /dev/null 2>&1; then
                  echo oute-mind health check PASSED
                  docker exec oute-app curl -s http://localhost:8000/health | python3 -m json.tool 2>/dev/null || true
                  break
                fi
                if [ \"\$i\" -eq 20 ]; then
                  echo oute-mind health check FAILED after 20 attempts
                  exit 1
                fi
                echo \"  attempt \${i}/20, retrying in 3s...\"
                sleep 3
              done
            '"

      - name: Deployment success
        if: success()
        run: |
          VM_IP=$(gcloud compute addresses describe oute-mind-ip \
            --region=us-central1 --format="get(address)")
          echo "Deployment to VM successful!"
          echo "  App: http://${VM_IP}"
          echo "  Health: http://${VM_IP}/caddy-health"

      - name: Capture logs on failure
        if: failure()
        run: |
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=${{ env.GCP_ZONE }} \
            --command="sudo -u ${{ env.DEPLOY_USER }} bash -c '
              cd /home/${{ env.DEPLOY_USER }}/oute-mind
              echo === Container Status ===
              docker compose ps
              echo === oute-app Logs ===
              docker compose logs --tail=50 app 2>&1 || true
            '" || echo "Could not connect to VM for log capture"
