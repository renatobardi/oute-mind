name: Deploy to GCP

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_ZONE: us-central1-a
  VM_NAME: oute-mind
  PROJECT_ID: oute-mind

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/897931738821/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@oute-mind.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to VM
        run: |
          ZONE=$(gcloud compute instances list --filter="name:${{ env.VM_NAME }}" --format="value(zone)" --project=${{ env.PROJECT_ID }} | head -1)
          echo "Deploying to zone: $ZONE"
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=$ZONE \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command='
              set -e
              sudo bash -c "
                if ! docker compose version &>/dev/null; then
                  echo \"Installing docker compose v2 plugin...\"
                  mkdir -p /usr/local/lib/docker/cli-plugins
                  ARCH=\$(uname -m)
                  curl -fsSL \"https://github.com/docker/compose/releases/latest/download/docker-compose-linux-\$ARCH\" -o /usr/local/lib/docker/cli-plugins/docker-compose
                  chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
                fi
                echo \"Using: \$(docker compose version)\"

                OUTE_MIND=/home/renatobardicabral_gmail_com/oute-mind
                echo \"Found oute-mind at: \$OUTE_MIND\"

                git config --global --add safe.directory \$OUTE_MIND

                cd \$OUTE_MIND
                git fetch origin main
                git checkout main 2>/dev/null || git checkout -b main origin/main
                git reset --hard origin/main
                git clean -fd --exclude=\".env*\"
                ln -sf .env.production .env

                echo \"=== Removing old images ===\"
                docker compose down 2>/dev/null || true
                docker rmi oute-app 2>/dev/null || true
                docker image prune -f

                echo \"=== Building images ===\"
                docker compose build --no-cache --pull
                docker compose up -d
                echo \"Containers started successfully\"
              "
            '

      - name: Health checks
        run: |
          ZONE=$(gcloud compute instances list --filter="name:${{ env.VM_NAME }}" --format="value(zone)" --project=${{ env.PROJECT_ID }} | head -1)
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=$ZONE \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command='
              sudo bash -c "
                FAILED=0
                for svc in \"App:oute-app:8000:/health\"; do
                  name=\$(echo \"\$svc\" | cut -d: -f1)
                  container=\$(echo \"\$svc\" | cut -d: -f2)
                  port=\$(echo \"\$svc\" | cut -d: -f3)
                  path=\$(echo \"\$svc\" | cut -d: -f4)
                  OK=0
                  for i in \$(seq 1 20); do
                    if docker exec \"\$container\" sh -c \"curl -sf http://127.0.0.1:\${port}\${path}\" > /dev/null 2>&1; then
                      echo \"\${name} health check PASSED\"
                      OK=1
                      break
                    fi
                    echo \"  \${name} attempt \${i}/20...\"
                    sleep 3
                  done
                  if [ \"\$OK\" -eq 0 ]; then
                    echo \"\${name} health check FAILED\"
                    FAILED=\$((FAILED+1))
                  fi
                done
                if [ \"\$FAILED\" -gt 0 ]; then
                  echo \"Health check failed — aborting\"
                  exit 1
                fi
                echo \"Health check: passed\"
              "
            '

      - name: Deployment success
        if: success()
        run: |
          VM_IP=$(gcloud compute addresses describe oute-mind-ip \
            --region=us-central1 --project=${{ env.PROJECT_ID }} --format="get(address)")
          echo "oute-mind deployed successfully!"
          echo "  API:   http://${VM_IP}/health"
          echo "  Docs:  http://${VM_IP}/docs"
          echo "  Caddy: http://${VM_IP}/caddy-health"

      - name: Capture logs on failure
        if: failure()
        run: |
          ZONE=$(gcloud compute instances list --filter="name:${{ env.VM_NAME }}" --format="value(zone)" --project=${{ env.PROJECT_ID }} | head -1)
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=$ZONE \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command='
              sudo bash -c "
                OUTE_MIND=/home/renatobardicabral_gmail_com/oute-mind
                cd \$OUTE_MIND 2>/dev/null || true
                echo === Container Status ===
                docker compose ps
                for svc in app postgres redis qdrant mindsdb caddy prometheus grafana; do
                  echo === \$svc Logs ===
                  docker compose logs --tail=30 \$svc 2>&1 || true
                done
              "
            ' || echo "Could not connect to VM for log capture"
