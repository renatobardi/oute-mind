name: Deploy oute-mind to VM — Develop

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  GCP_ZONE: us-central1-a
  VM_NAME: oute-mind
  PROJECT_ID: oute-mind
  DEPLOY_USER: renatobardicabral_gmail_com

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/897931738821/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-actions-deploy@oute-mind.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy develop stack to VM
        run: |
          ZONE=$(gcloud compute instances list --filter="name:${{ env.VM_NAME }}" --format="value(zone)" --project=${{ env.PROJECT_ID }} | head -1)
          echo "Deploying develop to zone: $ZONE"
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=$ZONE \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command='
              set -e
              sudo -u ${{ env.DEPLOY_USER }} bash -c "
                if ! docker compose version &>/dev/null; then
                  mkdir -p /usr/local/lib/docker/cli-plugins
                  ARCH=\$(uname -m)
                  curl -fsSL \"https://github.com/docker/compose/releases/latest/download/docker-compose-linux-\$ARCH\" -o /usr/local/lib/docker/cli-plugins/docker-compose
                  chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
                fi

                OUTE_MIND=/home/renatobardicabral_gmail_com/oute-mind
                echo \"Found oute-mind at: \$OUTE_MIND\"

                git config --global --add safe.directory \$OUTE_MIND

                cd \$OUTE_MIND
                git fetch origin develop
                git checkout develop 2>/dev/null || git checkout -b develop origin/develop
                git reset --hard origin/develop
                git clean -fd --exclude=\".env*\"
                ln -sf .env.develop .env

                docker network inspect oute-dev-network &>/dev/null || docker network create oute-dev-network
                echo \"oute-dev-network OK\"

                echo \"=== Removendo containers dev antigos ===\"
                docker compose -f docker-compose.dev.yml down --remove-orphans 2>/dev/null || true
                for c in oute-dev-app oute-dev-postgres oute-dev-redis oute-dev-qdrant oute-dev-mindsdb oute-dev-caddy; do
                  docker rm -f \"\$c\" 2>/dev/null || true
                done
                docker rmi oute-dev-app 2>/dev/null || true

                echo \"=== Build das imagens de develop ===\"
                docker compose -f docker-compose.dev.yml build --no-cache --pull
                docker compose -f docker-compose.dev.yml up -d
                echo \"Develop stack iniciada\"
              "
            '

      - name: Health checks — develop
        run: |
          ZONE=$(gcloud compute instances list --filter="name:${{ env.VM_NAME }}" --format="value(zone)" --project=${{ env.PROJECT_ID }} | head -1)
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=$ZONE \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command='
              sudo -u ${{ env.DEPLOY_USER }} bash -c "
                FAILED=0
                for svc in \"App:oute-dev-app:8000:/health\"; do
                  name=\$(echo \"\$svc\" | cut -d: -f1)
                  container=\$(echo \"\$svc\" | cut -d: -f2)
                  port=\$(echo \"\$svc\" | cut -d: -f3)
                  path=\$(echo \"\$svc\" | cut -d: -f4)
                  OK=0
                  for i in \$(seq 1 40); do
                    if docker exec \"\$container\" sh -c \"curl -sf http://127.0.0.1:\${port}\${path}\" > /dev/null 2>&1; then
                      echo \"\${name} PASSED\"
                      OK=1
                      break
                    fi
                    echo \"  \${name} tentativa \${i}/40...\"
                    sleep 5
                  done
                  [ \"\$OK\" -eq 0 ] && echo \"\${name} FAILED (tried 40x5s=200s)\" && FAILED=\$((FAILED+1))
                done
                [ \"\$FAILED\" -gt 0 ] && echo \"Health check falhou\" && exit 1
                echo \"Health check: OK\"
              "
            '

      - name: Deployment success
        if: success()
        run: |
          VM_IP=$(gcloud compute addresses describe oute-mind-ip \
            --region=us-central1 --project=${{ env.PROJECT_ID }} --format="get(address)")
          echo "oute-mind develop deployed!"
          echo "  API:   http://${VM_IP}:8888/health"
          echo "  Docs:  http://${VM_IP}:8888/docs"
          echo "  Caddy: http://${VM_IP}:8888/caddy-health"

      - name: Capture logs on failure
        if: failure()
        run: |
          ZONE=$(gcloud compute instances list --filter="name:${{ env.VM_NAME }}" --format="value(zone)" --project=${{ env.PROJECT_ID }} | head -1)
          gcloud compute ssh ${{ env.VM_NAME }} \
            --zone=$ZONE \
            --project=${{ env.PROJECT_ID }} \
            --tunnel-through-iap \
            --command='
              sudo -u ${{ env.DEPLOY_USER }} bash -c "
                OUTE_MIND=/home/renatobardicabral_gmail_com/oute-mind
                cd \$OUTE_MIND 2>/dev/null || true
                echo === Container Status ===
                docker compose -f docker-compose.dev.yml ps
                for svc in app postgres redis qdrant mindsdb caddy-dev; do
                  echo === \$svc Logs ===
                  docker compose -f docker-compose.dev.yml logs --tail=20 \$svc 2>&1 || true
                done
              "
            ' || echo "Não foi possível conectar à VM para capturar logs"
