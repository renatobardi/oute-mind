version: "3.9"

services:
  # PostgreSQL - Database principal
  postgres:
    image: postgres:16-alpine
    container_name: oute-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./configs/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Queue manager
  redis:
    image: redis:7-alpine
    container_name: oute-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - Vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: oute-qdrant
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MindsDB - AI memory management
  mindsdb:
    image: mindsdb/mindsdb:latest
    container_name: oute-mindsdb
    environment:
      MINDSDB_STORAGE_DIR: /var/lib/mindsdb
    ports:
      - "47334:47334"
      - "47335:47335"
    volumes:
      - ./volumes/mindsdb:/var/lib/mindsdb
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:47334/api/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jina Reader - Web scraping local
  jina-reader:
    image: ghcr.io/intergalacticalvariable/reader:latest
    container_name: oute-jina-reader
    ports:
      - "3000:3000"
    volumes:
      - ./volumes/jina-cache:/app/local-storage
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1'
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # FastAPI - Main application
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
    container_name: oute-app
    environment:
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      SERPER_API_KEY: ${SERPER_API_KEY}
      COMPOSIO_API_KEY: ${COMPOSIO_API_KEY}
      OCR_API_KEY: ${OCR_API_KEY}
      QDRANT_API_KEY: ${QDRANT_API_KEY}
      QDRANT_URL: http://qdrant:6333
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINDSDB_API_KEY: ${MINDSDB_ADMIN_PASSWORD}
      MINDSDB_HOST: mindsdb
      MINDSDB_PORT: 47334
      MODEL: google/gemini-2.0-flash
      FASTAPI_PORT: 8000
      FASTAPI_WORKERS: 4
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      mindsdb:
        condition: service_healthy
      jina-reader:
        condition: service_healthy
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus - Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: oute-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./volumes/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana - Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: oute-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./volumes/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Caddy - Reverse proxy with HTTP
  caddy:
    image: caddy:latest
    container_name: oute-caddy
    ports:
      - "80:80"
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile
      - ./volumes/caddy-data:/data
      - ./volumes/caddy-config:/config
    networks:
      - oute-network
    restart: unless-stopped
    depends_on:
      - app

networks:
  oute-network:
    driver: bridge
