version: "3.9"

services:
  # PostgreSQL - Database principal
  postgres:
    image: postgres:16-alpine
    container_name: oute-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    volumes:
      - ./volumes/postgres:/var/lib/postgresql/data
      - ./configs/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Queue manager
  redis:
    image: redis:7-alpine
    container_name: oute-redis
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    expose:
      - "6379"
    volumes:
      - ./volumes/redis:/data
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Qdrant - Vector database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: oute-qdrant
    environment:
      QDRANT_API_KEY: ${QDRANT_API_KEY}
    expose:
      - "6333"
      - "6334"
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MindsDB - AI memory management
  mindsdb:
    image: mindsdb/mindsdb:latest
    container_name: oute-mindsdb
    environment:
      MINDSDB_STORAGE_DIR: /var/lib/mindsdb
    expose:
      - "47334"
      - "47335"
    volumes:
      - ./volumes/mindsdb:/var/lib/mindsdb
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:47334/api/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Jina Reader — uses cloud API (https://r.jina.ai), no container needed

  # FastAPI - Main application
  app:
    build:
      context: .
      dockerfile: app/Dockerfile
      args:
        OPENAI_API_KEY_BUILD: ${OPENAI_API_KEY}
    container_name: oute-app
    env_file:
      - .env.production
    environment:
      # Additional config not in .env.production
      QDRANT_URL: http://qdrant:6333
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MINDSDB_HOST: mindsdb
      MINDSDB_PORT: 47334
      FASTAPI_PORT: 8000
      FASTAPI_WORKERS: 4
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      mindsdb:
        condition: service_started
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # Prometheus - Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: oute-prometheus
    expose:
      - "9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./volumes/prometheus:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana - Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: oute-grafana
    expose:
      - "3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./volumes/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Caddy - Reverse proxy with HTTP
  caddy:
    image: caddy:latest
    container_name: oute-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile
      - ./volumes/caddy-data:/data
      - ./volumes/caddy-config:/config
    networks:
      - oute-network
    restart: unless-stopped
    depends_on:
      - app

  # oute-main services (Dashboard, Auth, Projects APIs)

  00_dashboard:
    build:
      context: ../oute-main
      dockerfile: packages/00_dashboard/Dockerfile
    container_name: oute-dashboard
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app-user:${POSTGRES_PASSWORD}@postgres:5432/oute_main
      - AUTH_SERVICE_URL=http://01_auth-profile:3001
      - PROJECTS_SERVICE_URL=http://02_projects:3002
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/dashboard/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  01_auth-profile:
    build:
      context: ../oute-main
      dockerfile: packages/01_auth-profile/Dockerfile
    container_name: oute-auth-profile
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app-user:${POSTGRES_PASSWORD}@postgres:5432/oute_main
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  02_projects:
    build:
      context: ../oute-main
      dockerfile: packages/02_projects/Dockerfile
    container_name: oute-projects
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app-user:${POSTGRES_PASSWORD}@postgres:5432/oute_main
      - AUTH_SERVICE_URL=http://01_auth-profile:3001
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  99_home:
    build:
      context: ../oute-main
      dockerfile: packages/99_home/Dockerfile
    container_name: oute-home
    expose:
      - "3003"
    environment:
      - NODE_ENV=production
      - VITE_AUTH_SERVICE_URL=http://34.132.93.171
      - VITE_API_TIMEOUT=30000
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  03_interview:
    build:
      context: ../oute-main
      dockerfile: packages/03_interview/Dockerfile
    container_name: oute-interview
    expose:
      - "3002"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://app-user:${POSTGRES_PASSWORD}@postgres:5432/oute_main
      - VITE_AUTH_SERVICE_URL=http://34.132.93.171
      - VITE_API_TIMEOUT=30000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/chat/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  98_oops:
    build:
      context: ../oute-main
      dockerfile: packages/98_oops/Dockerfile
    container_name: oute-oops
    expose:
      - "3004"
    environment:
      - NODE_ENV=production
    networks:
      - oute-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3004/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

networks:
  oute-network:
    driver: bridge
