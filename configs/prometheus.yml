global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'caddy'
    static_configs:
      - targets: ['caddy:80']

  - job_name: 'fastapi'
    static_configs:
      - targets: ['app:8000']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'postgresql'
    static_configs:
      - targets: ['postgres:5432']

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']

  # oute-main services monitoring
  - job_name: 'oute-dashboard'
    static_configs:
      - targets: ['00_dashboard:3000']

  - job_name: 'oute-auth-profile'
    static_configs:
      - targets: ['01_auth-profile:3001']

  - job_name: 'oute-projects'
    static_configs:
      - targets: ['02_projects:3002']
